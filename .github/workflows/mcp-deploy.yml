# =============================================================================
# Reusable MCP Deployment Workflow — Azure Container Apps
# =============================================================================
#
# Builds a Docker image, pushes to ACR, and deploys to Azure Container Apps.
# Follows the same pattern as Ansvar_platform/.github/workflows/build-images.yml.
#
# SETUP INSTRUCTIONS:
# 1. Copy this file to the org-level .github repo as:
#    Ansvar-Systems/.github/.github/workflows/mcp-deploy.yml
#
# 2. Add these GitHub Organization secrets (OIDC federated credentials):
#    - AZURE_CLIENT_ID:      Service principal client ID
#    - AZURE_TENANT_ID:      Azure AD tenant ID
#    - AZURE_SUBSCRIPTION_ID: Azure subscription ID
#
# 3. In each MCP repo, create a caller workflow (see deploy-azure-caller.yml)
#
# 4. Configure OIDC federation in Azure AD for the service principal:
#    az ad app federated-credential create --id <app-object-id> \
#      --parameters '{"name":"github-ansvar-systems","issuer":"https://token.actions.githubusercontent.com",
#      "subject":"repo:Ansvar-Systems/*:ref:refs/heads/main","audiences":["api://AzureADTokenExchange"]}'
#
# =============================================================================

name: Deploy MCP to Azure

on:
  workflow_call:
    inputs:
      container-app-name:
        description: "Azure Container App name (e.g., ca-mcp-eu-regulations)"
        required: true
        type: string
      target-port:
        description: "Container port (3000 for Node.js, 8000 for Python)"
        required: false
        type: number
        default: 3000
      resource-group:
        description: "Azure resource group"
        required: false
        type: string
        default: "rg-ansvar-dev"
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ansvardev.azurecr.io

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------
      # 1. Checkout source
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # 2. Azure login via OIDC (no stored credentials)
      # -----------------------------------------------------------------
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------
      # 3. Login to Azure Container Registry
      # -----------------------------------------------------------------
      - name: Login to ACR
        run: az acr login --name ansvardev

      # -----------------------------------------------------------------
      # 4. Derive image tag from commit SHA (7-char, no "latest")
      # -----------------------------------------------------------------
      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.REGISTRY }}/${{ inputs.container-app-name }}:${SHA}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Image: ${IMAGE}"

      # -----------------------------------------------------------------
      # 5. Build and push Docker image
      # -----------------------------------------------------------------
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.tag.outputs.image }}

      # -----------------------------------------------------------------
      # 6. Deploy to Azure Container Apps
      # -----------------------------------------------------------------
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name "${{ inputs.container-app-name }}" \
            --resource-group "${{ inputs.resource-group }}" \
            --image "${{ steps.tag.outputs.image }}"

      # -----------------------------------------------------------------
      # 7. Verify revision health
      # -----------------------------------------------------------------
      - name: Verify deployment
        run: |
          echo "Waiting for new revision to become active..."
          sleep 10

          HEALTH=$(az containerapp revision list \
            --name "${{ inputs.container-app-name }}" \
            --resource-group "${{ inputs.resource-group }}" \
            --query "[0].{name:name, state:properties.runningState, health:properties.healthState, replicas:properties.replicas}" \
            -o json)

          echo "Latest revision status:"
          echo "$HEALTH" | jq .

          STATE=$(echo "$HEALTH" | jq -r '.state // "unknown"')
          HEALTH_STATE=$(echo "$HEALTH" | jq -r '.health // "unknown"')

          if [ "$STATE" = "Failed" ]; then
            echo "::error::Revision is in Failed state"
            az containerapp logs show \
              --name "${{ inputs.container-app-name }}" \
              --resource-group "${{ inputs.resource-group }}" \
              --tail 30 --type system
            exit 1
          fi

          echo "Deployment complete: state=${STATE}, health=${HEALTH_STATE}"

      # -----------------------------------------------------------------
      # 8. Job summary
      # -----------------------------------------------------------------
      - name: Write summary
        if: always()
        run: |
          echo "## MCP Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Container App | \`${{ inputs.container-app-name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ steps.tag.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ inputs.resource-group }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ steps.tag.outputs.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
